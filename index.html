<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>whtype.info</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e10;
      color: #1f5555;
      font-family: 'Roboto Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    .logo {
      font-size: clamp(60px, 12vw, 140px);
      color: #4fc8c8;
      letter-spacing: .04em;
      user-select: none;
    }
    .logo strong {
      font-weight: 900;
      background: color-mix(in srgb, currentColor 15%, transparent);
      padding: 2px 12px;
      margin-right: 6px;
      border-radius: 4px;
    }
    .subtitle {
      font-size: clamp(16px, 3vw, 28px);
      color: #4fc8c8;
      letter-spacing: .08em;
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo"><strong>wh</strong>type</div>
  <div class="subtitle">update is warping in<span class="cursor">_</span></div>
</body>
</html>
