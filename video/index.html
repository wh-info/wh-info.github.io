<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>whtype.info - Update in progress</title>
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e10;
      color: #00c8c8;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .title {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.05em;
      font-weight: bold;
    }
    .title .blink {
      font-weight: bold;
      animation: blink 1s step-end infinite;
    }
    .subtitle {
      margin-top: 1.5rem;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: #5a8a8a;
      max-width: 500px;
      line-height: 1.5;
      border: 1px dotted #1a3a3a;
      border-radius: 4px;
      padding: 12px 20px;
    }
    .logo {
      margin-top: 2.5rem;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #00c8c8;
    }
    .logo strong {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="title">update warping in<span class="blink">_</span></div>
  <div class="subtitle">While you're here, you may want to clear your cache before the update lands.</div>
  <div class="logo"><strong>wh</strong>type.info</div>
</body>
</html>
